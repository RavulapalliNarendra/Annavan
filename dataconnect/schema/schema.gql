type User @table {
  displayName: String!
  email: String!
  photoUrl: String
  createdAt: Timestamp!
}

type Transaction @table {
  user: User!
  category: Category!
  amount: Float!
  type: String!
  date: Date!
  description: String
  createdAt: Timestamp!
}

type Category @table {
  user: User!
  name: String!
  type: String!
  description: String
  createdAt: Timestamp!
}

type Budget @table {
  user: User!
  category: Category!
  limitAmount: Float!
  startDate: Date!
  endDate: Date!
  description: String
  createdAt: Timestamp!
}

type FinancialGoal @table {
  user: User!
  name: String!
  targetAmount: Float!
  targetDate: Date!
  description: String
  currentAmount: Float
  createdAt: Timestamp!
}